# Debug snippet: shells, RTT, polling kscan, thread monitoring.
# Enable with: west build -b 5x5x3 -S debug -- -DSNIPPET_ROOT=<path-to-zmk-config> ...

# Re-enable ZMK LOG_DBG strings (production strips them via ZMK_LOGGING_MINIMAL=y).
CONFIG_ZMK_LOGGING_MINIMAL=n

# Console + log over USB CDC ACM
CONFIG_ZMK_USB_LOGGING=y

# RTT log + shell through the SWD probe
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_RTT_BUFFER=0
CONFIG_SHELL_BACKEND_RTT=y
CONFIG_SHELL_BACKEND_RTT_BUFFER=1

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_TAB=y
CONFIG_SHELL_TAB_AUTOCOMPLETION=y
CONFIG_SHELL_MINIMAL=y
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=512
CONFIG_SHELL_BACKEND_SERIAL_TX_RING_BUFFER_SIZE=512
CONFIG_LOG_CMDS=y
CONFIG_DEVICE_SHELL=y
CONFIG_KERNEL_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_BT_SHELL=y
CONFIG_SETTINGS_SHELL=y
CONFIG_FLASH_SHELL=n
CONFIG_ADC_SHELL=n
CONFIG_SHELL_PROMPT_UART="5x5x3$ "

# Thread visibility (kernel thread list / stacks)
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y

# Stack overflow detection
CONFIG_STACK_SENTINEL=y

# Force kscan to poll so behaviour is independent of GPIO interrupt setup;
# in production the matrix runs interrupt-driven for power savings.
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y
